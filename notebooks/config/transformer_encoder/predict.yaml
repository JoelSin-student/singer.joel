# Specify prediction parameters in YAML
#
#
#
#

mode: predict

location:
  data_path: "data/test_data"
  config_path: "notebooks/config/transformer_encoder/test.yaml"

predict:
  # model
  d_model: 512
  n_head: 8
  num_encoder_layer: 8
  dropout: 0.1
  batch_size: 32
  sequence_len: 150
  smoothing_sigma: 2

  # check point file path
  checkpoint_file: './results/weight/best_skeleton_model.pth'
