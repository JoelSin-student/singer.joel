mode: predict

location:
  data_path: "data/test_data"
  config_path: "notebooks/config/transformer_encoder/predict.yaml"

predict:
  model_mode: soleformer  # original | simple_seq2seq | soleformer

  # Model
  d_model: 512
  n_head: 8
  num_encoder_layer: 8
  dropout: 0.1
  batch_size: 64

  # Inference and preprocessing
  sequence_len: 32  # Must match training sequence_len
  max_windows: null  # Optional cap for quick prediction tests
  smoothing_sigma: 0.0
  use_time_feature: false  # Usually auto-read from checkpoint; can override if needed
  use_gradient_data: false  # Usually auto-read from checkpoint; can override if needed
  grad_window_length: 5
  grad_polyorder: 2
  grad_smooth_grad1: false

  # Checkpoint
  checkpoint_file: "./results/weight/best_skeleton_model_soleformer.pth"
