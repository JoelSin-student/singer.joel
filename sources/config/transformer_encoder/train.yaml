mode: train

location:
  data_path: "data/training_data"
  awinda_targets_dir: "data/clean_data/Awinda_targets_soleformer"
  awinda_tabs_dir: "data/raw_data/Awinda/extracted_tabs/required_tabs"
  config_path: "sources/config/transformer_encoder/train.yaml"

train:
  model_mode: soleformer  # original | simple_seq2seq | soleformer

  # Model
  d_model: 512
  n_head: 8
  num_encoder_layer: 8
  dropout: 0.1

  # Training
  epoch: 40  # Adjust in function of training and validation loss curves
  batch_size: 64

  # Optimization
  learning_rate: 0.0005
  weight_decay: 0.001

  # Preprocessing
  sequence_len: 32  # Default for non-SoleFormer modes
  smoothing_sigma: 0.0
  use_time_feature: false  # Add normalized insole time as one extra input channel
  use_gradient_data: false
  grad_window_length: 5  # Savitzky-Golay window length for derivatives
  grad_polyorder: 2  # Savitzky-Golay polynomial order
  grad_smooth_grad1: false  # Smooth first derivative before second derivative

  # SoleFormer-specific hyperparameters (kept separate from shared defaults)
  soleformer_d_model: 512
  soleformer_n_head: 8
  soleformer_num_encoder_layer: 2  # Figure 3 shows a two-tier cross-attention block
  soleformer_dropout: 0.1
  soleformer_epoch: 40
  soleformer_batch_size: 64
  soleformer_learning_rate: 0.0003
  soleformer_weight_decay: 0.0001
  soleformer_sequence_len: 32  # Increased context for KickCap dynamics while keeping SoleFormer-only scope
  soleformer_use_lower_leg_angles_for_accelnet: true  # Paper-style: derive foot orientation from ankle->toe for IMU cycle
  soleformer_use_graph_pressure: true  # Set false to replace the pressure GNN with an MLP encoder
  soleformer_use_single_attention: false  # Set true to keep only pressure -> IMU cross-attention
  soleformer_use_weight_decay_schedule: true  # Warm-up + cosine decay for weight decay
  soleformer_weight_decay_warmup_epochs: 5
  soleformer_min_weight_decay: 0.0

  # Shared cycle loss defaults (disabled for non-soleformer modes)
  use_cycle_loss: false  # Set to true only for soleformer; other modes will override via mode check
  enable_imu_cycle_loss: true
  enable_pressure_cycle_loss: true
  pose_loss_weight_2d: 1.0
  pose_loss_weight_3d: 1.0
  imu_cycle_loss_weight: 1.0
  pressure_cycle_loss_weight: 1.0
  freeze_pretrained_cycle_nets: true
  accelnet_pretrained_path: null  # Optional: path to pre-trained AccelNet checkpoint
  pressnet_pretrained_path: null  # Optional: path to pre-trained PressNet checkpoint

  # Auxiliary net pretraining (for AccelNet and PressNet if enabled)
  pretrain_accelnet: false  # Pretrain AccelNet (pose → IMU) on pose→IMU task; enabled for soleformer only
  pretrain_pressnet: false  # Pretrain PressNet (pose → pressure) on pose→pressure task; enabled for soleformer only
  pretrain_epochs: 30  # Number of epochs for auxiliary net pretraining
  pretrain_learning_rate: 0.001  # Learning rate for auxiliary net pretraining

  # SoleFormer-specific cycle loss settings
  soleformer_use_cycle_loss: true
  soleformer_pretrain_accelnet: true
  soleformer_pretrain_pressnet: true

  # SoleFormer targets (used only when model_mode=soleformer)
  include_target_positions: true
  include_target_joint_angles: false  # Keep target as available 3D joint positions from your data
  joint_angles_tab_suffix: "Joint_Angles_ZXY"


